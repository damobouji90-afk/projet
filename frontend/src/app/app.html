<div class="topnav" *ngIf="authService.authState()">
  <div class="brand">Smart City</div>
  <div class="user-card">
    <div class="user-avatar" *ngIf="avatarUrl(); else avatarPlaceholder">
      <img [src]="avatarUrl()" alt="User avatar" />
    </div>
    <ng-template #avatarPlaceholder>
      <div class="user-avatar placeholder">A</div>
    </ng-template>
    <div class="user-meta">
      <span class="user-role">{{ role() === 'admin' ? 'Admin' : 'Citoyen' }}</span>
      <span class="user-name">{{ userName() }}</span>
    </div>
  </div>
  <div class="menu-container">
      <nav class="menu">
        <!-- CITOYEN -->
        <div *ngIf="role() === 'citoyen' || role() === 'citizen'">
          <a routerLink="/report" routerLinkActive="active">Signal</a>
          <a routerLink="/profile" routerLinkActive="active">Profil</a>
        </div>
        <!-- ADMIN -->
        <div *ngIf="role() === 'admin'">
          <a routerLink="/dashboard" routerLinkActive="active">Home</a>
          <a routerLink="/sensors" routerLinkActive="active">Sensors</a>
          <a routerLink="/traffic" routerLinkActive="active">Traffic</a>
          <a routerLink="/parking" routerLinkActive="active">Parking</a>
          <a routerLink="/complaints" routerLinkActive="active">Complaints</a>
          <a routerLink="/profile" routerLinkActive="active">Profile</a>
        </div>
      </nav>

    <div class="auth-buttons">
      <button type="button" class="theme-toggle" (click)="toggleDarkMode()">
        {{ themeService.darkMode() ? '☀️ Light' : '🌙 Dark' }}
      </button>
      <button (click)="logout()" class="logout-btn">Logout</button>
    </div>
  </div>
</div>

<div class="topnav" *ngIf="!authService.authState()">
  <div class="brand">Smart City</div>
  <div class="auth-buttons">
    <button type="button" class="login-btn" (click)="router.navigate(['/login'])">Se connecter</button>
    <button type="button" class="register-btn" (click)="router.navigate(['/register'])">S'inscrire</button>
    <button type="button" class="theme-toggle" (click)="toggleDarkMode()">
      {{ themeService.darkMode() ? '☀️ Light' : '🌙 Dark' }}
    </button>
  </div>
</div>

<main>
  <router-outlet></router-outlet>
</main>
